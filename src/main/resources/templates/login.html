<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 · NoticeBoard</title>
    <!-- Pretendard 폰트 (CDN) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <!-- 우리 공통 CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        /* 로그인 페이지 전용 레이아웃 */
        .login-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: var(--surface);
            width: 100%;
            max-width: 400px;
            padding: 48px 40px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);  /* 은은한 그림자 */
        }
        .login-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 8px;
        }
        .login-sub {
            font-size: 14px;
            color: var(--text-sub);
            margin-bottom: 32px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .login-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 14px;
            color: var(--text-sub);
        }
        .login-footer a {
            color: var(--navy);
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="login-card">
        <div class="login-title">NoticeBoard</div>
        <div class="login-sub">로그인하고 게시판을 이용하세요</div>

        <!-- 로그인 실패 시 에러 메시지 (URL에 ?error 있으면 표시) -->
        <div class="alert-error" th:if="${param.error}">
            아이디 또는 비밀번호가 올바르지 않습니다.
        </div>
        <!-- 로그아웃 완료 메시지 -->
        <div th:if="${param.logout}" style="color: var(--text-sub); font-size: 14px; margin-bottom: 16px;">
            로그아웃되었습니다.
        </div>

        <!-- 로그인 폼 — Security의 loginProcessingUrl로 POST 전송 -->
        <form th:action="@{/view/login}" method="post">
            <div class="form-group">
                <label for="username">아이디</label>
                <input type="text" id="username" name="username" class="input"
                       placeholder="loginId" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" class="input"
                       placeholder="비밀번호" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
                로그인
            </button>
        </form>

        <div class="login-footer">
            아직 회원이 아니신가요? <a th:href="@{/view/signup}">회원가입</a>
        </div>
    </div>
</div>
</body>
</html>
